<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dólar</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; height: 100vh; width: 100vw; }
    canvas { display: block; }
    #canvas-container { width: 100%; height: 100%; }

    #loader {
      position: fixed; inset: 0; z-index: 999; background: #000;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      transition: opacity 0.8s ease;
    }
    #loader.fade { opacity: 0; pointer-events: none; }
    #loader .title {
      color: #9ecb8a; font-family: 'Courier New', monospace; font-size: 14px;
      letter-spacing: 4px; opacity: 0.8; margin-bottom: 24px;
    }
    #loader .bar-bg { width: 180px; height: 3px; background: #1a2a1a; border-radius: 2px; overflow: hidden; }
    #loader .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2e6b3a, #8fd49b); transition: width 0.15s; }
    #loader .pct { color: #4a6a4a; font-family: 'Courier New', monospace; font-size: 11px; margin-top: 10px; }

    #hint {
      position: fixed; bottom: 18px; left: 0; right: 0; text-align: center;
      color: #cfe8c8; opacity: 0; font-family: 'Courier New', monospace; font-size: 11px;
      letter-spacing: 2px; transition: opacity 1.2s ease; pointer-events: none; z-index: 50;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    #hint.show { opacity: 0.34; }
    #sound-ind {
      position: fixed; top: 12px; right: 14px; color: #cfe8c8; opacity: 0.4;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 1px; z-index: 50;
      cursor: pointer; pointer-events: auto; text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>

  <div id="hint">click: dinheiro &middot; scroll: densidade &middot; G glitch &middot; B chuva &middot; F tela cheia &middot; S som &middot; space pausa</div>
  <div id="sound-ind">&#128264; click para som</div>

  <div id="loader">
    <div class="title">CONTANDO</div>
    <div class="bar-bg"><div class="bar-fill" id="loader-bar"></div></div>
    <div class="pct" id="loader-pct">0%</div>
  </div>

  <script>
    let p5Instance = null;
    const loaderEl  = document.getElementById('loader');
    const loaderBar = document.getElementById('loader-bar');
    const loaderPct = document.getElementById('loader-pct');
    const hintEl    = document.getElementById('hint');
    const soundEl   = document.getElementById('sound-ind');

    let loadingTimerDone = false, p5LoadingDone = false;
    function checkReady() {
      if (loadingTimerDone && p5LoadingDone) {
        if (p5Instance) p5Instance.startExperience();
        loaderEl.classList.add('fade');
      }
    }
    setTimeout(() => { loadingTimerDone = true; checkReady(); }, 2500);

    /* ---------- generative audio (cash register vibe) ---------- */
    let audio = null, audioOn = false, audioMuted = false;
    function initAudio() {
      if (audio) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const ac = new AC();
      const master = ac.createGain(); master.gain.value = 0.0001; master.connect(ac.destination);
      const delay = ac.createDelay(1.0); delay.delayTime.value = 0.28;
      const fb = ac.createGain(); fb.gain.value = 0.3;
      const wet = ac.createGain(); wet.gain.value = 0.3;
      delay.connect(fb); fb.connect(delay); delay.connect(wet); wet.connect(master);
      // low drone bed
      const drone = ac.createGain(); drone.gain.value = 0.1;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 360;
      drone.connect(lp); lp.connect(master); lp.connect(delay);
      [55, 82.5, 110].forEach((f, i) => {
        const o = ac.createOscillator(); o.type = i === 2 ? 'triangle' : 'sine'; o.frequency.value = f;
        const og = ac.createGain(); og.gain.value = i === 0 ? 0.6 : 0.25;
        o.connect(og); og.connect(drone); o.start();
      });
      const lfo = ac.createOscillator(); lfo.frequency.value = 0.05;
      const lfoG = ac.createGain(); lfoG.gain.value = 150;
      lfo.connect(lfoG); lfoG.connect(lp.frequency); lfo.start();
      audio = { ac, master, delay };
      master.gain.setTargetAtTime(0.5, ac.currentTime, 1.4);
      audioOn = true; audioMuted = false;
      soundEl.innerHTML = '&#9835; som ligado';
    }
    function bell(freq, vel, dur) {
      if (!audio || audioMuted) return;
      const ac = audio.ac, now = ac.currentTime;
      const o  = ac.createOscillator(); o.type = 'sine';     o.frequency.value = freq;
      const o2 = ac.createOscillator(); o2.type = 'triangle'; o2.frequency.value = freq * 2.002;
      const g = ac.createGain(); g.gain.value = 0;
      o.connect(g); o2.connect(g); g.connect(audio.master); g.connect(audio.delay);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.linearRampToValueAtTime(vel, now + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, now + (dur || 0.6));
      o.start(now); o2.start(now); o.stop(now + dur + 0.1); o2.stop(now + dur + 0.1);
    }
    function noiseTick(dur, vel, freq) {
      if (!audio || audioMuted) return;
      const ac = audio.ac;
      const n = Math.floor(ac.sampleRate * (dur || 0.12));
      const buf = ac.createBuffer(1, n, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = ac.createBufferSource(); src.buffer = buf;
      const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq || 3200; bp.Q.value = 0.8;
      const g = ac.createGain(); g.gain.value = vel || 0.18;
      src.connect(bp); bp.connect(g); g.connect(audio.master);
      src.start();
    }
    function chaChing() {
      if (!audioOn) return;
      bell(987, 0.22, 0.5); noiseTick(0.05, 0.12, 5000);
      setTimeout(() => { bell(1318, 0.22, 0.7); noiseTick(0.04, 0.08, 6000); }, 110);
    }
    function toggleSound() {
      if (!audio) { initAudio(); return; }
      audioMuted = !audioMuted;
      audio.master.gain.setTargetAtTime(audioMuted ? 0.0001 : 0.5, audio.ac.currentTime, 0.3);
      soundEl.innerHTML = audioMuted ? '&#128263; som mudo' : '&#9835; som ligado';
    }
    soundEl.addEventListener('click', e => { e.stopPropagation(); toggleSound(); });

    const sketch = function(p) {
      const BUF_W = 680, BUF_H = 680;
      let buf, ctx;
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*'.split('');

      // denominations: paper, ink (dark line work), seal accent, label
      const denoms = [
        { val:'1',   name:'ONE DOLLAR',     who:'WASHINGTON', paper:[212,214,196], ink:[34,74,48],  seal:[120,40,40] },
        { val:'20',  name:'TWENTY DOLLARS', who:'JACKSON',    paper:[214,212,190], ink:[40,80,52],  seal:[90,60,30]  },
        { val:'100', name:'ONE HUNDRED',    who:'FRANKLIN',   paper:[210,216,200], ink:[30,70,46],  seal:[60,70,40]  },
        { val:'∞', name:'INFINITE RESERVE', who:'CLAUDE', paper:[224,206,150], ink:[120,86,24], seal:[150,110,30] }, // golden ∞
      ];
      let curDenom = 0;

      let phase = 'appearing', phaseT = 0;
      let appear = 0, dissolve = 0;

      let renderMode = 0, prevMode = 0, modeT = 1;
      let grid = 4, gridTarget = 4;
      const GRID_MIN = 4, GRID_MAX = 20;
      let densDir = 1, densTimer = 0;

      let t = 0, paused = false;
      let spinY = 0, spinX = 0, mouseSpin = 0, mouseTilt = 0, targetSpin = 0, targetTilt = 0;
      let rotEaseIn = 0;

      let mInfX = 0, mInfY = 0;

      let loadingPhase = true, warmFrames = 0;
      const WARM_TARGET = 60;

      let glitchActive = false, glitchIntensity = 0, glitchSlices = [], glitchTimer = 0;

      let motes = [];   // floating $ glyphs
      let bills = [];   // falling banknotes
      let billSpawnT = 0;

      const easeInOutCubic = x => x < 0.5 ? 4*x*x*x : 1 - p.pow(-2*x+2, 3) / 2;
      const easeOutQuart   = x => 1 - p.pow(1 - x, 4);

      p.setup = function() {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.pixelDensity(1);
        p.textFont('Courier New, monospace');
        p.textAlign(p.CENTER, p.CENTER);
        p.noStroke();
        buf = p.createGraphics(BUF_W, BUF_H);
        buf.pixelDensity(1);
        buf.noSmooth();
        buf.textFont('Courier New, monospace');
        buf.canvas.getContext('2d', { willReadFrequently: true });
        ctx = p.drawingContext;
        initMotes();
        startDenom(0);
      };

      function startDenom(idx) {
        curDenom = idx;
        phase = 'appearing'; phaseT = 0;
        appear = 0; dissolve = 0;
        grid = GRID_MIN; gridTarget = GRID_MIN; densDir = 1; densTimer = 0;
        modeT = 1; bills = []; billSpawnT = 0;
      }

      p.startExperience = function() {
        loadingPhase = false;
        hintEl.classList.add('show');
        setTimeout(() => hintEl.classList.remove('show'), 8000);
      };

      /* ---------------- particles ---------------- */
      function initMotes() {
        motes = [];
        for (let i = 0; i < 30; i++) {
          motes.push({ x: p.random(BUF_W), y: p.random(BUF_H), sp: p.random(4, 12),
            drift: p.random(p.TWO_PI), depth: p.random(0.3, 1), sz: p.random(10, 22) });
        }
      }
      function updateMotes(dt) {
        for (const m of motes) {
          m.drift += dt * 0.5;
          m.y -= m.sp * dt * m.depth;
          m.x += p.cos(m.drift) * 7 * dt;
          if (m.y < -20) { m.y = BUF_H + 20; m.x = p.random(BUF_W); }
        }
      }
      function drawMotes(g) {
        const f = denoms[curDenom];
        g.textAlign(p.CENTER, p.CENTER);
        for (const m of motes) {
          const px = m.x + mInfX * 0.05 * m.depth;
          const py = m.y + mInfY * 0.05 * m.depth;
          const tw = 0.35 + 0.45 * (0.5 + 0.5 * p.sin(m.drift * 3));
          g.fill(f.ink[0]*1.4, f.ink[1]*1.5, f.ink[2]*1.3, 120 * tw * m.depth);
          g.textSize(m.sz * m.depth);
          g.text('$', px, py);
        }
      }

      function spawnBill(burst) {
        const f = denoms[curDenom];
        bills.push({
          x: burst ? BUF_W/2 + p.random(-120,120) : p.random(BUF_W),
          y: burst ? BUF_H*0.42 : -40,
          vx: p.random(-20, 20), vy: burst ? p.random(-30, 10) : p.random(20, 50),
          rot: p.random(p.TWO_PI), vrot: p.random(-3, 3),
          w: p.random(46, 72), flip: p.random(p.TWO_PI), flipSp: p.random(2, 5),
          paper: f.paper, ink: f.ink, val: f.val, life: 0, maxLife: p.random(4, 7)
        });
      }
      function moneyRain(n, burst) { for (let i = 0; i < n; i++) spawnBill(burst); }
      function updateBills(dt) {
        for (let i = bills.length - 1; i >= 0; i--) {
          const b = bills[i];
          b.life += dt; b.flip += dt * b.flipSp; b.vy += dt * 22;
          b.x += b.vx * dt; b.y += b.vy * dt; b.rot += b.vrot * dt;
          if (b.life > b.maxLife || b.y > BUF_H + 60) bills.splice(i, 1);
        }
      }
      function drawBills(g) {
        for (const b of bills) {
          const fadeOut = p.constrain(1 - (b.life - (b.maxLife - 1.4)) / 1.4, 0, 1);
          const a = 255 * fadeOut;
          if (a < 5) continue;
          const sx = p.abs(p.cos(b.flip));
          const w = b.w * p.max(0.12, sx), h = b.w * 0.46;
          g.push(); g.translate(b.x, b.y); g.rotate(b.rot);
          g.fill(b.paper[0], b.paper[1], b.paper[2], a);
          g.rectMode(p.CENTER); g.rect(0, 0, w, h, 3);
          g.noFill(); g.stroke(b.ink[0], b.ink[1], b.ink[2], a*0.8); g.strokeWeight(1);
          g.rect(0, 0, w*0.84, h*0.7, 2);
          g.noStroke(); g.fill(b.ink[0], b.ink[1], b.ink[2], a);
          g.textAlign(p.CENTER, p.CENTER); g.textSize(h*0.5);
          if (w > 10) g.text(b.val, 0, 0);
          g.pop();
        }
      }

      /* ---------------- the banknote ---------------- */
      function roundRect(g, x, y, w, h, r) { g.rect(x, y, w, h, r); }

      function drawNote(g, f, w, h, back, alpha) {
        const ink = f.ink, paper = f.paper;
        g.rectMode(p.CENTER);
        // paper
        g.noStroke();
        g.fill(paper[0], paper[1], paper[2], alpha);
        roundRect(g, 0, 0, w, h, h*0.05);
        // guilloché wash
        g.stroke(ink[0], ink[1], ink[2], alpha*0.16); g.strokeWeight(1); g.noFill();
        for (let k = -3; k <= 3; k++) {
          g.beginShape();
          for (let xx = -w/2; xx <= w/2; xx += w/26) {
            const yy = k*h*0.085 + p.sin(xx*0.06 + k + t*0.5)*4;
            g.vertex(xx, yy);
          }
          g.endShape();
        }
        // ornate borders
        g.stroke(ink[0], ink[1], ink[2], alpha); g.strokeWeight(p.max(1, w*0.006)); g.noFill();
        roundRect(g, 0, 0, w*0.95, h*0.86, h*0.05);
        g.strokeWeight(1);
        roundRect(g, 0, 0, w*0.90, h*0.78, h*0.04);

        const big = w > h*1.1; // enough width to render text/details

        if (!back) {
          // ---- FRONT ----
          // central oval portrait
          g.noStroke(); g.fill(paper[0]*0.92, paper[1]*0.92, paper[2]*0.9, alpha);
          g.ellipse(0, h*0.04, w*0.26, h*0.6);
          g.stroke(ink[0], ink[1], ink[2], alpha); g.strokeWeight(1.4); g.noFill();
          g.ellipse(0, h*0.04, w*0.26, h*0.6);
          // bust silhouette
          g.noStroke(); g.fill(ink[0], ink[1], ink[2], alpha*0.85);
          g.ellipse(0, h*0.0, w*0.09, h*0.24);                 // head
          g.beginShape();                                       // shoulders
          g.vertex(-w*0.1, h*0.28); g.bezierVertex(-w*0.08, h*0.1, w*0.08, h*0.1, w*0.1, h*0.28);
          g.endShape();
          g.fill(paper[0], paper[1], paper[2], alpha*0.55);
          g.arc(0, -h*0.04, w*0.11, h*0.18, p.PI, p.TWO_PI);    // hair/forehead light
          // seals left/right
          g.stroke(f.seal[0], f.seal[1], f.seal[2], alpha); g.strokeWeight(1.4); g.noFill();
          g.ellipse(-w*0.34, h*0.06, w*0.11, w*0.11);
          for (let s = 0; s < 9; s++) {                          // star burst seal
            const a = (p.TWO_PI/9)*s;
            g.line(-w*0.34, h*0.06, -w*0.34 + p.cos(a)*w*0.05, h*0.06 + p.sin(a)*w*0.05);
          }
          g.fill(f.seal[0], f.seal[1], f.seal[2], alpha*0.5); g.noStroke();
          g.ellipse(w*0.34, h*0.06, w*0.1, w*0.1);
          // text
          if (big) {
            g.noStroke(); g.fill(ink[0], ink[1], ink[2], alpha); g.textAlign(p.CENTER, p.CENTER);
            g.textSize(h*0.085); g.text('FEDERAL RESERVE NOTE', 0, -h*0.34);
            g.textSize(h*0.07);  g.text('THE UNITED STATES OF AMERICA', 0, -h*0.27);
            g.textSize(h*0.13);  g.text(f.name, 0, h*0.36);
            g.textSize(h*0.055); g.text('IN ' + f.who + ' WE TRUST', 0, h*0.43);
          }
          // corner numerals
          g.fill(ink[0], ink[1], ink[2], alpha); g.noStroke();
          g.textSize(h*0.2);
          g.text(f.val, -w*0.4, -h*0.3); g.text(f.val, w*0.4, -h*0.3);
          g.text(f.val, -w*0.4,  h*0.3); g.text(f.val, w*0.4,  h*0.3);
        } else {
          // ---- BACK ----
          g.noStroke();
          // left roundel: pyramid + eye
          g.stroke(ink[0], ink[1], ink[2], alpha); g.strokeWeight(1.4); g.noFill();
          g.ellipse(-w*0.26, h*0.02, w*0.3, h*0.62);
          g.fill(ink[0], ink[1], ink[2], alpha*0.85); g.noStroke();
          g.triangle(-w*0.26, -h*0.18, -w*0.37, h*0.16, -w*0.15, h*0.16); // pyramid
          g.fill(paper[0], paper[1], paper[2], alpha);
          g.triangle(-w*0.26, -h*0.18, -w*0.32, -h*0.02, -w*0.20, -h*0.02); // capstone
          g.fill(ink[0], ink[1], ink[2], alpha);
          g.ellipse(-w*0.26, -h*0.10, w*0.03, h*0.05); // eye
          // right roundel: eagle (abstract)
          g.stroke(ink[0], ink[1], ink[2], alpha); g.strokeWeight(1.4); g.noFill();
          g.ellipse(w*0.26, h*0.02, w*0.3, h*0.62);
          g.fill(ink[0], ink[1], ink[2], alpha*0.8); g.noStroke();
          g.beginShape();
          g.vertex(w*0.26, -h*0.12);
          g.bezierVertex(w*0.36, -h*0.04, w*0.36, h*0.1, w*0.26, h*0.12);
          g.bezierVertex(w*0.16, h*0.1, w*0.16, -h*0.04, w*0.26, -h*0.12);
          g.endShape();
          g.fill(paper[0], paper[1], paper[2], alpha);
          g.ellipse(w*0.26, -h*0.06, w*0.04, h*0.06); // eagle head
          // center
          if (big) {
            g.noStroke(); g.fill(ink[0], ink[1], ink[2], alpha); g.textAlign(p.CENTER, p.CENTER);
            g.textSize(h*0.07);  g.text('IN GOD WE TRUST', 0, -h*0.28);
            g.textSize(h*0.085); g.text('UNITED STATES OF AMERICA', 0, h*0.26);
          }
          // big central value outline
          g.noFill(); g.stroke(ink[0], ink[1], ink[2], alpha); g.strokeWeight(p.max(1.5, w*0.01));
          g.textAlign(p.CENTER, p.CENTER); g.textSize(h*0.5);
          if (big) { g.fill(paper[0]*0.9, paper[1]*0.9, paper[2]*0.9, alpha); g.text(f.val, 0, 0); }
          g.noStroke();
        }
        g.rectMode(p.CORNER);
        g.noStroke();
      }

      function drawNoteToBuffer(f, ap, di) {
        buf.background(0);
        buf.noStroke();
        drawMotes(buf);

        const eApp = easeOutQuart(ap);
        const cx = BUF_W/2, cy = BUF_H*0.44 + (1 - eApp) * 240;

        // spin: continuous + mouse, faster while dissolving
        const sX = p.cos(spinY);                 // horizontal foreshorten / face select
        const back = sX < 0;
        const absX = p.max(0.05, p.abs(sX));
        const baseW = 470, baseH = 200;
        const w = baseW * absX * (0.6 + 0.4*eApp) * (1 - di*0.25);
        const h = baseH * (0.6 + 0.4*eApp) * (1 - di*0.1);
        const alpha = 255 * eApp * (1 - di);

        buf.push();
        buf.translate(cx, cy);
        buf.rotate(p.sin(spinX) * 0.12);        // gentle tilt roll
        buf.shearX(-mouseTilt * 0.5);           // perspective-ish tilt from mouse
        if (alpha > 4) drawNote(buf, f, w, h, back, alpha);

        // sheen sweep
        const sheen = (p.sin(spinY*2 + t) * 0.5 + 0.5);
        buf.noStroke();
        buf.rectMode(p.CENTER);
        buf.fill(255, 255, 255, 26 * absX * eApp * (1 - di));
        buf.rect((sheen - 0.5) * w * 0.9, 0, w * 0.16, h, 4);
        buf.rectMode(p.CORNER);
        buf.pop();

        drawBills(buf);
        buf.loadPixels();
      }

      p.draw = function() {
        const dt = paused ? 0 : p.deltaTime / 1000;
        const f = denoms[curDenom];

        if (loadingPhase) {
          p.background(0);
          appear = p.min(0.5, warmFrames / WARM_TARGET * 0.5);
          spinY += 0.04; updateMotes(p.deltaTime / 1000);
          drawNoteToBuffer(f, appear, 0);
          renderToScreen();
          warmFrames++;
          const pct = p.min(100, p.floor(warmFrames / WARM_TARGET * 100));
          if (loaderBar) loaderBar.style.width = pct + '%';
          if (loaderPct) loaderPct.textContent = pct + '%';
          if (warmFrames >= WARM_TARGET) { p5LoadingDone = true; checkReady(); }
          return;
        }

        p.background(0);
        if (!paused) t += 0.016;

        rotEaseIn = p.min(1, rotEaseIn + dt * 0.1);
        const re = easeInOutCubic(rotEaseIn);

        const spinSpeed = 0.7 + dissolve * 2.5;
        spinY += dt * spinSpeed * re;
        spinX += dt * 0.5;

        targetSpin = (p.mouseX - p.width/2) / p.width * 2.0;
        targetTilt = (p.mouseY - p.height/2) / p.height * 0.6;
        mouseSpin += (targetSpin - mouseSpin) * 0.05;
        mouseTilt += (targetTilt - mouseTilt) * 0.05;
        spinY += mouseSpin * 0.02 * re;

        if (phase === 'appearing') {
          appear += (1 - appear) * 0.04; phaseT += dt;
          if (appear > 0.97) { appear = 1; phase = 'spinning'; phaseT = 0; chaChing(); }
        }

        densTimer += dt;
        if (densTimer > 0.8) {
          densTimer = 0; triggerGlitch();
          prevMode = renderMode; renderMode = (renderMode + 1) % 3; modeT = 0;
          if (audioOn && p.random() < 0.5) bell(p.random([784, 988, 1175]), 0.08, 0.4);
          if (densDir === 1) { gridTarget = GRID_MAX; densDir = -1; }
          else               { gridTarget = GRID_MIN; densDir =  1; }
        }

        if (phase === 'spinning') {
          phaseT += dt;
          if (audioOn && p.random() < 0.004) bell(p.random([1318, 1568, 1760]), 0.05, 0.5);
          if (phaseT > 22) { phase = 'dissolving'; phaseT = 0; triggerGlitch(); chaChing(); }
        }

        if (phase === 'dissolving') {
          dissolve = p.min(1, dissolve + dt * 0.5); phaseT += dt;
          billSpawnT += dt;
          if (billSpawnT > 0.05 && bills.length < 60) {
            billSpawnT = 0; spawnBill(true);
            if (audioOn && p.random() < 0.3) noiseTick(0.04, 0.05, p.random(2000,5000));
          }
          if (dissolve > 0.98) { phase = 'waiting'; phaseT = 0; }
        }

        if (phase === 'waiting') {
          phaseT += dt;
          if (phaseT > 0.5) {
            prevMode = renderMode; renderMode = (renderMode + 1) % 3; modeT = 0;
            triggerGlitch();
            startDenom((curDenom + 1) % denoms.length);
            chaChing();
          }
        }

        grid += (gridTarget - grid) * 0.08;
        modeT = p.min(1, modeT + dt * 4.0);

        updateGlitch(dt); updateMotes(dt); updateBills(dt);

        if (phase === 'spinning') {
          mInfX += ((p.mouseX - p.width/2) * 0.06 - mInfX) * 0.04;
          mInfY += ((p.mouseY - p.height/2) * 0.06 - mInfY) * 0.04;
        } else { mInfX *= 0.95; mInfY *= 0.95; }

        drawNoteToBuffer(f, appear, dissolve);

        glitchTimer -= dt;
        if (glitchTimer <= 0 && !glitchActive) {
          glitchTimer = p.random(3, 7);
          if (p.random() < 0.4) triggerGlitch();
        }

        drawBackdrop(f, appear * (1 - dissolve));
        renderToScreen();
        drawGlitchOverlay();
        drawHud();
      };

      function drawBackdrop(f, k) {
        const cx = p.width/2 + mInfX, cy = p.height*0.44 + mInfY;
        const rad = p.max(p.width, p.height) * 0.7;
        const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
        const glow = 0.05 + k * 0.07;
        gr.addColorStop(0, 'rgba('+f.ink[0]+','+f.ink[1]+','+f.ink[2]+','+glow+')');
        gr.addColorStop(0.5, 'rgba('+p.floor(f.ink[0]*0.4)+','+p.floor(f.ink[1]*0.4)+','+p.floor(f.ink[2]*0.4)+','+(glow*0.4)+')');
        gr.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gr; ctx.fillRect(0, 0, p.width, p.height);
      }

      /* ---------------- glitch (shared) ---------------- */
      function triggerGlitch() {
        glitchActive = true; glitchIntensity = p.random(0.4, 1.0); glitchSlices = [];
        if (audioOn && p.random() < 0.7) noiseTick(p.random(0.1,0.3), 0.1*glitchIntensity, p.random(800,2500));
        const scaleF = p.min(p.width / BUF_W, p.height / BUF_H) * 0.85;
        const rW = BUF_W * scaleF, rH = BUF_H * scaleF;
        const fOx = (p.width - rW)/2 + mInfX, fOy = (p.height - rH)/2 + mInfY;
        const numSlices = p.floor(p.random(3, 10));
        for (let i = 0; i < numSlices; i++) {
          const sy = p.random(fOy, fOy + rH);
          const sh = p.min(p.random(2, rH * 0.08), fOy + rH - sy);
          glitchSlices.push({ y: sy, h: sh, fx: fOx, fw: rW,
            offset: p.random(-80, 80) * glitchIntensity, colorShift: p.random() < 0.4,
            duration: p.random(0.08, 0.3) });
        }
      }
      function updateGlitch(dt) {
        if (!glitchActive) return;
        let allDone = true;
        for (const s of glitchSlices) { s.duration -= dt; if (s.duration > 0) allDone = false; else s.offset *= 0.7; }
        if (allDone) { glitchActive = false; glitchSlices = []; }
      }
      function drawGlitchOverlay() {
        if (!glitchActive || !glitchSlices.length) return;
        for (const s of glitchSlices) {
          if (p.abs(s.offset) < 0.5) continue;
          const sx = p.floor(s.fx), sy = p.floor(s.y), sw = p.floor(s.fw), sh = p.floor(s.h);
          if (sw < 1 || sh < 1) continue;
          if (s.colorShift) {
            ctx.save(); ctx.globalAlpha = 0.7; ctx.globalCompositeOperation = 'lighter';
            ctx.drawImage(ctx.canvas, sx, sy, sw, sh, sx + s.offset*1.5, sy, sw, sh);
            ctx.globalAlpha = 0.45;
            ctx.drawImage(ctx.canvas, sx, sy, sw, sh, sx - s.offset, sy, sw, sh);
            ctx.restore();
          } else {
            ctx.drawImage(ctx.canvas, sx, sy, sw, sh, sx + s.offset, sy, sw, sh);
          }
        }
      }

      /* ---------------- render (shared ascii/dots/pixels) ---------------- */
      function renderToScreen() {
        const px = buf.pixels;
        const g = p.max(4, p.round(grid));
        const asciiG = p.max(g, 6);
        const scaleF = p.min(p.width / BUF_W, p.height / BUF_H) * 0.85;
        const invScale = 1 / scaleF;
        const renderW = BUF_W * scaleF, renderH = BUF_H * scaleF;
        const ox = (p.width - renderW)/2 + mInfX, oy = (p.height - renderH)/2 + mInfY;
        const curM = renderMode, prevM = prevMode, mt = modeT;
        const transitionDone = mt >= 0.99;
        const useNative = (curM === 0) || (!transitionDone && prevM === 0);
        if (useNative) { ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; }
        const gEff = (curM === 0 && transitionDone) ? asciiG : g;
        const halfG = gEff * 0.5;
        const yStart = p.max(0, p.floor(oy / gEff) * gEff), yEnd = p.min(p.height, oy + renderH);
        const xStart = p.max(0, p.floor(ox / gEff) * gEff), xEnd = p.min(p.width, ox + renderW);
        const asciiSize = gEff * 1.1;
        let lastFontStr = '';
        for (let sy = yStart; sy < yEnd; sy += gEff) {
          const byBase = p.floor((sy - oy) * invScale);
          if (byBase < 0 || byBase >= BUF_H) continue;
          const rowOff = byBase * BUF_W;
          for (let sx = xStart; sx < xEnd; sx += gEff) {
            const bx = p.floor((sx - ox) * invScale);
            if (bx < 0 || bx >= BUF_W) continue;
            const idx = (rowOff + bx) * 4;
            const r = px[idx], gr = px[idx+1], b = px[idx+2];
            if ((r + gr + b) < 12) continue;
            const bright = r*0.299 + gr*0.587 + b*0.114;
            const cx = sx + halfG, cy = sy + halfG;
            let mode;
            if (transitionDone) mode = curM;
            else { const hash = ((sx*73 + sy*137) & 0xFF) * 0.00392; mode = hash < mt ? curM : prevM; }
            if (mode === 0) {
              const fontSz = p.floor(asciiSize * (0.4 + bright * 0.004));
              const fontStr = fontSz + 'px Courier New';
              if (fontStr !== lastFontStr) { ctx.font = fontStr; lastFontStr = fontStr; }
              ctx.fillStyle = 'rgb(' + r + ',' + gr + ',' + b + ')';
              const ci = ((bright >> 2) + ((sx*7 + sy*13) >> 3)) % chars.length;
              ctx.fillText(chars[ci], cx, cy);
            } else if (mode === 1) {
              p.fill(r, gr, b); const d = gEff * (0.1 + bright * 0.0033); p.ellipse(cx, cy, d, d);
            } else {
              p.fill(r, gr, b); p.rectMode(p.CENTER); p.rect(cx, cy, gEff*0.93, gEff*0.93);
            }
          }
        }
      }

      function drawHud() {
        p.fill(200, 230, 200, 45); p.textSize(9); p.textAlign(p.LEFT, p.TOP);
        p.text(p.floor(p.frameRate()) + ' fps  |  ' + (paused ? 'pausa' : '$' + denoms[curDenom].val + ' ' + phase), 10, 10);
        p.textAlign(p.CENTER, p.CENTER);
      }

      p.mousePressed = function() {
        if (loadingPhase) return;
        if (!audio) initAudio();
        triggerGlitch(); chaChing();
        moneyRain(p.floor(p.random(8, 16)), true);
      };
      p.keyPressed = function() {
        if (p.key === 'f' || p.key === 'F') { const fs = p.fullscreen(); p.fullscreen(!fs); }
        if (p.key === 'g' || p.key === 'G') triggerGlitch();
        if (p.key === 'b' || p.key === 'B') { moneyRain(p.floor(p.random(14, 26)), false); chaChing(); }
        if (p.key === 's' || p.key === 'S') toggleSound();
        if (p.key === ' ') paused = !paused;
      };
      p.mouseWheel = function(e) {
        if (loadingPhase) return;
        gridTarget = p.constrain(gridTarget + (e.delta > 0 ? 1.5 : -1.5), GRID_MIN, GRID_MAX);
        densDir = e.delta > 0 ? -1 : 1;
        return false;
      };
      p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
    };

    p5Instance = new p5(sketch, document.getElementById('canvas-container'));
  </script>
</body>
