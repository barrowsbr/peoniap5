<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peonia+</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas { display: block; }

    #canvas-container { width: 100%; height: 100%; }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s ease;
    }

    #loader.fade { opacity: 0; pointer-events: none; }

    #loader .title {
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 4px;
      opacity: 0.7;
      margin-bottom: 24px;
    }

    #loader .bar-bg {
      width: 180px;
      height: 3px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    #loader .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c77, #e9b);
      transition: width 0.15s;
    }

    #loader .pct {
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      margin-top: 10px;
    }

    #hint {
      position: fixed;
      bottom: 18px; left: 0; right: 0;
      text-align: center;
      color: #fff;
      opacity: 0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      transition: opacity 1.2s ease;
      pointer-events: none;
      z-index: 50;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    #hint.show { opacity: 0.34; }

    #sound-ind {
      position: fixed;
      top: 12px; right: 14px;
      color: #fff;
      opacity: 0.35;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      z-index: 50;
      cursor: pointer;
      pointer-events: auto;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>

  <div id="hint">click: pétalas &middot; scroll: densidade &middot; G glitch &middot; P pétalas &middot; F tela cheia &middot; S som &middot; space pausa</div>
  <div id="sound-ind">&#128264; click para som</div>

  <div id="loader">
    <div class="title">FLORECIENDO</div>
    <div class="bar-bg">
      <div class="bar-fill" id="loader-bar"></div>
    </div>
    <div class="pct" id="loader-pct">0%</div>
  </div>

  <script>
    let p5Instance = null;

    const loaderEl  = document.getElementById('loader');
    const loaderBar = document.getElementById('loader-bar');
    const loaderPct = document.getElementById('loader-pct');
    const hintEl    = document.getElementById('hint');
    const soundEl   = document.getElementById('sound-ind');

    let loadingTimerDone = false;
    let p5LoadingDone    = false;

    function checkReady() {
      if (loadingTimerDone && p5LoadingDone) {
        if (p5Instance) p5Instance.startExperience();
        loaderEl.classList.add('fade');
      }
    }

    setTimeout(() => { loadingTimerDone = true; checkReady(); }, 2500);

    /* ---------- generative audio (no assets, starts on first gesture) ---------- */
    let audio = null, audioOn = false, audioMuted = false;
    const PENTA = [0, 2, 4, 7, 9, 12, 14, 16];

    function initAudio() {
      if (audio) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const ac = new AC();

      const master = ac.createGain();
      master.gain.value = 0.0001;
      master.connect(ac.destination);

      // feedback delay -> sense of space
      const delay = ac.createDelay(1.0);
      delay.delayTime.value = 0.34;
      const fb = ac.createGain();  fb.gain.value = 0.34;
      const wet = ac.createGain(); wet.gain.value = 0.32;
      delay.connect(fb); fb.connect(delay); delay.connect(wet); wet.connect(master);

      // low drone bed
      const drone = ac.createGain(); drone.gain.value = 0.13;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 420;
      drone.connect(lp); lp.connect(master); lp.connect(delay);
      const base = 110; // A2
      [1, 1.5, 2.005].forEach((mul, i) => {
        const o = ac.createOscillator();
        o.type = i === 2 ? 'triangle' : 'sine';
        o.frequency.value = base * mul;
        const og = ac.createGain(); og.gain.value = i === 0 ? 0.6 : 0.22;
        o.connect(og); og.connect(drone); o.start();
      });
      // slow filter sweep
      const lfo = ac.createOscillator(); lfo.frequency.value = 0.045;
      const lfoG = ac.createGain(); lfoG.gain.value = 190;
      lfo.connect(lfoG); lfoG.connect(lp.frequency); lfo.start();

      audio = { ac, master, delay };
      master.gain.setTargetAtTime(0.5, ac.currentTime, 1.6);
      audioOn = true;
      audioMuted = false;
      soundEl.innerHTML = '&#9835; som ligado';
    }

    function chime(transpose, vel) {
      if (!audio || audioMuted) return;
      const ac = audio.ac, now = ac.currentTime;
      const note = PENTA[Math.floor(Math.random() * PENTA.length)] + (transpose || 0);
      const freq = 261.63 * Math.pow(2, note / 12);
      const o  = ac.createOscillator(); o.type = 'sine';  o.frequency.value = freq;
      const o2 = ac.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 2.002;
      const g = ac.createGain(); g.gain.value = 0;
      o.connect(g); o2.connect(g); g.connect(audio.master); g.connect(audio.delay);
      const v = vel || 0.18;
      g.gain.setValueAtTime(0.0001, now);
      g.gain.linearRampToValueAtTime(v, now + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 1.9);
      o.start(now); o2.start(now); o.stop(now + 2.0); o2.stop(now + 2.0);
    }

    function bloomChord() {
      if (!audioOn) return;
      [0, 130, 270, 430].forEach(d => setTimeout(() => chime(12, 0.16), d));
    }

    function noiseWash(dur, vel) {
      if (!audio || audioMuted) return;
      const ac = audio.ac;
      dur = dur || 0.4;
      const n = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, n, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = ac.createBufferSource(); src.buffer = buf;
      const bp = ac.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = 1100 + Math.random() * 1400; bp.Q.value = 0.7;
      const g = ac.createGain(); g.gain.value = vel || 0.2;
      src.connect(bp); bp.connect(g); g.connect(audio.master);
      src.start();
    }

    function toggleSound() {
      if (!audio) { initAudio(); return; }
      audioMuted = !audioMuted;
      audio.master.gain.setTargetAtTime(audioMuted ? 0.0001 : 0.5, audio.ac.currentTime, 0.3);
      soundEl.innerHTML = audioMuted ? '&#128263; som mudo' : '&#9835; som ligado';
    }
    soundEl.addEventListener('click', (e) => { e.stopPropagation(); toggleSound(); });

    const sketch = function(p) {
      const BUF_W = 680, BUF_H = 680;
      let buf;
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*'.split('');
      let ctx;

      let elements = [];
      let curEl    = 0;

      let phase  = 'growing';
      let phaseT = 0;

      let bloom       = 0;
      let bloomTarget = 1;
      let lastBloom   = -1;

      let renderMode = 0, prevMode = 0, modeT = 1;

      let grid = 4, gridTarget = 4;
      const GRID_MIN = 4, GRID_MAX = 20;
      let densDir = 1, densTimer = 0;

      let mInfX = 0, mInfY = 0;
      let t = 0;

      let rotX = 0, rotY = 0, rotZ = 0;
      let autoRotX = 0, autoRotY = 0, autoRotZ = 0;
      let mouseRotX = 0, mouseRotY = 0;
      let targetMouseRotX = 0, targetMouseRotY = 0;
      let rotEaseIn = 0;

      let loadingPhase = true;
      let warmFrames   = 0;
      const WARM_TARGET = 60;

      let glitchTimer     = 0;
      let glitchActive    = false;
      let glitchIntensity = 0;
      let glitchSlices    = [];

      let wilt     = 0;
      let lastWilt = -1;

      let paused = false;

      // particle systems
      let petals = [];
      let pollen = [];
      let petalSpawnT = 0;

      const easeInOutCubic = x => x < 0.5 ? 4*x*x*x : 1 - p.pow(-2*x+2, 3) / 2;
      const easeOutQuart   = x => 1 - p.pow(1 - x, 4);

      p.setup = function() {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.pixelDensity(1);
        p.textFont('Courier New, monospace');
        p.textAlign(p.CENTER, p.CENTER);
        p.noStroke();

        buf = p.createGraphics(BUF_W, BUF_H);
        buf.pixelDensity(1);
        buf.noSmooth();
        buf.canvas.getContext('2d', { willReadFrequently: true });

        ctx = p.drawingContext;

        elements = [
          { c1:[230,130,170], c2:[255,210,235], c3:[170,60,100],  stemC:[55,85,40],  layers:14, petalsPerLayer:9,  maxRadius:155, ruffleAmt:12, sepals:5 },
          { c1:[240,170,190], c2:[255,230,240], c3:[190,90,130],  stemC:[55,88,42],  layers:15, petalsPerLayer:10, maxRadius:150, ruffleAmt:14, sepals:6 },
          { c1:[200,100,180], c2:[245,185,225], c3:[150,45,110],  stemC:[50,80,38],  layers:13, petalsPerLayer:9,  maxRadius:158, ruffleAmt:13, sepals:5 },
          { c1:[120,95,205],  c2:[205,185,255], c3:[70,40,125],   stemC:[45,72,55],  layers:16, petalsPerLayer:10, maxRadius:152, ruffleAmt:15, sepals:6 }, // midnight violet
          { c1:[245,200,120], c2:[255,242,205], c3:[200,140,60],  stemC:[60,85,40],  layers:14, petalsPerLayer:9,  maxRadius:156, ruffleAmt:13, sepals:5 }, // golden
        ];

        initPollen();
        startElement(0);
      };

      function startElement(idx) {
        curEl       = idx;
        bloom       = 0;
        bloomTarget = 1;
        lastBloom   = -1;
        lastWilt    = -1;
        wilt        = 0;
        phase       = 'growing';
        phaseT      = 0;
        grid        = GRID_MIN;
        gridTarget  = GRID_MIN;
        densDir     = 1;
        densTimer   = 0;
        modeT       = 1;
        petals      = [];
        petalSpawnT = 0;
      }

      p.startExperience = function() {
        loadingPhase = false;
        hintEl.classList.add('show');
        setTimeout(() => hintEl.classList.remove('show'), 8000);
      };

      /* ---------------- particles ---------------- */
      function initPollen() {
        pollen = [];
        for (let i = 0; i < 44; i++) {
          pollen.push({
            x: p.random(BUF_W), y: p.random(BUF_H),
            r: p.random(1.4, 3.8),
            sp: p.random(3, 11),
            drift: p.random(p.TWO_PI),
            depth: p.random(0.3, 1)
          });
        }
      }

      function updatePollen(dt) {
        for (const m of pollen) {
          m.drift += dt * 0.45;
          m.y -= m.sp * dt * m.depth;
          m.x += p.cos(m.drift) * 6 * dt;
          if (m.y < -6) { m.y = BUF_H + 6; m.x = p.random(BUF_W); }
        }
      }

      function drawPollen(g) {
        for (const m of pollen) {
          const px = m.x + mInfX * 0.05 * m.depth;
          const py = m.y + mInfY * 0.05 * m.depth;
          const tw = 0.4 + 0.6 * (0.5 + 0.5 * p.sin(m.drift * 3));
          g.fill(255, 238, 205, 95 * tw * m.depth);
          const d = m.r * m.depth;
          g.ellipse(px, py, d, d);
        }
      }

      function spawnPetal(f, cx, cy, burst) {
        const pal = p.random() < 0.5 ? f.c1 : f.c2;
        petals.push({
          x: cx + p.random(-95, 95),
          y: cy + p.random(-70, 50),
          vx: p.random(-14, 14) * (burst ? 1.6 : 1),
          vy: p.random(burst ? -30 : 4, burst ? 6 : 26),
          rot: p.random(p.TWO_PI),
          vrot: p.random(-2.4, 2.4),
          size: p.random(13, 30),
          sway: p.random(p.TWO_PI),
          swaySpeed: p.random(1.4, 3.6),
          r: pal[0], g: pal[1], b: pal[2],
          life: 0,
          maxLife: p.random(3.6, 6.5)
        });
      }

      function petalBurst(f, n) {
        for (let i = 0; i < n; i++) spawnPetal(f, BUF_W/2, BUF_H*0.38, true);
        if (audioOn) { chime(0, 0.16); chime(7, 0.12); }
      }

      function updatePetals(dt) {
        for (let i = petals.length - 1; i >= 0; i--) {
          const pt = petals[i];
          pt.life += dt;
          pt.sway += dt * pt.swaySpeed;
          pt.vy += dt * 16;
          pt.x += (pt.vx + p.cos(pt.sway) * 20) * dt;
          pt.y += pt.vy * dt;
          pt.rot += pt.vrot * dt;
          if (pt.life > pt.maxLife || pt.y > BUF_H + 50) petals.splice(i, 1);
        }
      }

      function drawPetals(g) {
        for (const pt of petals) {
          const fadeIn  = p.constrain(pt.life / 0.4, 0, 1);
          const fadeOut = p.constrain(1 - (pt.life - (pt.maxLife - 1.4)) / 1.4, 0, 1);
          const a = 255 * fadeIn * fadeOut;
          if (a < 4) continue;
          g.push();
          g.translate(pt.x, pt.y);
          g.rotate(pt.rot);
          const w = pt.size;
          const flutter = 0.45 + 0.55 * p.abs(p.cos(pt.sway)); // tumbling -> edge-on thin
          const h = pt.size * 0.55 * flutter;
          g.fill(pt.r, pt.g, pt.b, a);
          g.beginShape();
          g.vertex(0, 0);
          g.bezierVertex(w*0.3, -h, w*0.8, -h, w, 0);
          g.bezierVertex(w*0.8,  h, w*0.3,  h, 0, 0);
          g.endShape(p.CLOSE);
          g.fill(255, 255, 255, a * 0.18);
          g.ellipse(w*0.35, 0, w*0.18, h*0.5);
          g.pop();
        }
      }

      /* ---------------- backdrop glow ---------------- */
      function drawBackdrop(f, bl) {
        const cx = p.width/2 + mInfX, cy = p.height*0.42 + mInfY;
        const rad = p.max(p.width, p.height) * 0.7;
        const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
        const glow = 0.05 + bl * 0.08;
        gr.addColorStop(0,   'rgba('+f.c3[0]+','+f.c3[1]+','+f.c3[2]+','+glow+')');
        gr.addColorStop(0.5, 'rgba('+p.floor(f.c1[0]*0.3)+','+p.floor(f.c1[1]*0.3)+','+p.floor(f.c1[2]*0.3)+','+(glow*0.4)+')');
        gr.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = gr;
        ctx.fillRect(0, 0, p.width, p.height);
      }

      p.draw = function() {
        const dt = paused ? 0 : p.deltaTime / 1000;
        const f  = elements[curEl];

        if (loadingPhase) {
          p.background(0);
          bloom = p.min(0.5, warmFrames / WARM_TARGET * 0.5);
          updatePollen(p.deltaTime / 1000);
          drawFlowerToBuffer(f, bloom, 0);
          renderToScreen();
          warmFrames++;
          const pct = p.min(100, p.floor(warmFrames / WARM_TARGET * 100));
          if (loaderBar) loaderBar.style.width = pct + '%';
          if (loaderPct) loaderPct.textContent  = pct + '%';
          if (warmFrames >= WARM_TARGET) {
            p5LoadingDone = true;
            checkReady();
          }
          return;
        }

        p.background(0);
        if (!paused) t += 0.016;

        rotEaseIn = p.min(1, rotEaseIn + dt * 0.08);
        const re = easeInOutCubic(rotEaseIn);

        autoRotY += dt * 0.3  * re;
        autoRotX += dt * 0.12 * p.sin(t * 0.15) * re;
        autoRotZ += dt * 0.08 * p.sin(t * 0.09 + 1.5) * re;

        targetMouseRotX = (p.mouseY - p.height / 2) / p.height * 1.2;
        targetMouseRotY = (p.mouseX - p.width  / 2) / p.width  * 1.8;
        mouseRotX += (targetMouseRotX - mouseRotX) * 0.04;
        mouseRotY += (targetMouseRotY - mouseRotY) * 0.04;

        rotX = autoRotX + mouseRotX * re;
        rotY = autoRotY + mouseRotY * re;
        rotZ = autoRotZ;

        if (phase === 'growing') {
          bloom += (bloomTarget - bloom) * 0.006;
          phaseT += dt;
          if (audioOn && p.random() < 0.012) chime(0, 0.06 + bloom * 0.06);
          if (bloom > 0.98) { bloom = 1; phase = 'interactive'; phaseT = 0; bloomChord(); }
        }

        densTimer += dt;
        if (densTimer > 0.8) {
          densTimer = 0;
          triggerGlitch();
          prevMode   = renderMode;
          renderMode = (renderMode + 1) % 3;
          modeT      = 0;
          if (audioOn && p.random() < 0.6) chime(phase === 'wilting' ? -12 : 0, 0.1);
          if (densDir === 1) { gridTarget = GRID_MAX; densDir = -1; }
          else               { gridTarget = GRID_MIN; densDir =  1; }
        }

        if (phase === 'interactive') {
          phaseT += dt;
          if (audioOn && p.random() < 0.008) chime(12, 0.06);
          if (phaseT > 25) { phase = 'wilting'; phaseT = 0; triggerGlitch();
            if (audioOn) { chime(-12, 0.2); chime(-5, 0.14); } }
        }

        if (phase === 'wilting') {
          wilt    = p.min(1, wilt + dt * 0.04);
          phaseT += dt;
          petalSpawnT += dt;
          if (petalSpawnT > 0.16 && petals.length < 70) {
            petalSpawnT = 0;
            spawnPetal(f, BUF_W/2, BUF_H*0.38, false);
            if (audioOn && p.random() < 0.45) chime(-12, 0.09);
          }
          if (wilt > 0.95) { phase = 'waiting'; phaseT = 0; }
        }

        if (phase === 'waiting') {
          phaseT += dt;
          if (phaseT > 0.6) {
            prevMode   = renderMode;
            renderMode = (renderMode + 1) % 3;
            modeT      = 0;
            triggerGlitch();
            startElement((curEl + 1) % elements.length);
            if (audioOn) chime(0, 0.12);
          }
        }

        grid  += (gridTarget - grid) * 0.08;
        modeT  = p.min(1, modeT + dt * 4.0);

        updateGlitch(dt);
        updatePollen(dt);
        updatePetals(dt);

        if (phase === 'interactive') {
          mInfX += ((p.mouseX - p.width  / 2) * 0.08 - mInfX) * 0.04;
          mInfY += ((p.mouseY - p.height / 2) * 0.08 - mInfY) * 0.04;
        } else {
          mInfX *= 0.95;
          mInfY *= 0.95;
        }

        drawFlowerToBuffer(f, bloom, wilt);

        glitchTimer -= dt;
        if (glitchTimer <= 0 && !glitchActive) {
          glitchTimer = p.random(3, 7);
          if (p.random() < 0.4) triggerGlitch();
        }

        drawBackdrop(f, bloom);
        renderToScreen();
        drawGlitchOverlay();
        drawHud();
      };

      function triggerGlitch() {
        glitchActive    = true;
        glitchIntensity = p.random(0.4, 1.0);
        glitchSlices    = [];
        if (audioOn && p.random() < 0.7) noiseWash(p.random(0.15, 0.4), 0.12 * glitchIntensity);
        const scaleF = p.min(p.width / BUF_W, p.height / BUF_H) * 0.85;
        const rW = BUF_W * scaleF, rH = BUF_H * scaleF;
        const fOx = (p.width  - rW) / 2 + mInfX;
        const fOy = (p.height - rH) / 2 + mInfY;
        const numSlices = p.floor(p.random(3, 10));
        for (let i = 0; i < numSlices; i++) {
          const sy = p.random(fOy, fOy + rH);
          const sh = p.min(p.random(2, rH * 0.08), fOy + rH - sy);
          glitchSlices.push({
            y: sy, h: sh, fx: fOx, fw: rW,
            offset: p.random(-80, 80) * glitchIntensity,
            colorShift: p.random() < 0.4,
            duration: p.random(0.08, 0.3)
          });
        }
      }

      function updateGlitch(dt) {
        if (!glitchActive) return;
        let allDone = true;
        for (const s of glitchSlices) {
          s.duration -= dt;
          if (s.duration > 0) allDone = false;
          else s.offset *= 0.7;
        }
        if (allDone) { glitchActive = false; glitchSlices = []; }
      }

      function drawGlitchOverlay() {
        if (!glitchActive || !glitchSlices.length) return;
        for (const s of glitchSlices) {
          if (p.abs(s.offset) < 0.5) continue;
          const sx = p.floor(s.fx), sy = p.floor(s.y), sw = p.floor(s.fw), sh = p.floor(s.h);
          if (sw < 1 || sh < 1) continue;
          if (s.colorShift) {
            ctx.save();
            ctx.globalAlpha = 0.7;
            ctx.globalCompositeOperation = 'lighter';
            ctx.drawImage(ctx.canvas, sx, sy, sw, sh, sx + s.offset*1.5, sy, sw, sh);
            ctx.globalAlpha = 0.45;
            ctx.drawImage(ctx.canvas, sx, sy, sw, sh, sx - s.offset, sy, sw, sh);
            ctx.restore();
          } else {
            ctx.drawImage(ctx.canvas, sx, sy, sw, sh, sx + s.offset, sy, sw, sh);
          }
        }
      }

      function drawFlowerToBuffer(f, bl, wl) {
        buf.background(0);
        buf.noStroke();
        wl = wl || 0;
        drawPollen(buf);
        const stemProgress = p.constrain(bl * 3, 0, 1);
        const flowerBloom  = p.constrain((bl - 0.15) / 0.85, 0, 1);
        const wiltDroop    = wl * 55;
        const flowerCX     = BUF_W / 2;
        const flowerCY     = BUF_H * 0.38 + wiltDroop;
        drawStem(buf, f, stemProgress, wl, flowerCX, flowerCY);
        drawPeony3D(buf, f, flowerBloom, wl, flowerCX, flowerCY);
        drawPetals(buf);
        buf.loadPixels();
      }

      function drawStem(g, f, progress, wl, cx, cy) {
        wl = wl || 0;
        const stemLen = BUF_H * 0.42;
        const stemX   = BUF_W / 2;
        const stemTop = cy;
        const stemBot = stemTop + stemLen;
        const visibleLen = stemLen * easeOutQuart(progress);
        const visibleTop = stemBot - visibleLen;
        for (let y = visibleTop; y < stemBot; y += 3) {
          const tt       = (y - stemTop) / stemLen;
          const sw       = p.lerp(15, 8, tt);
          const wiltBend = wl * 45 * (1 - tt) * p.sin((1 - tt) * p.PI);
          const curveX   = p.sin(tt * p.PI * 0.3) * 22 + p.sin(tt * p.PI * 0.8) * 8 + wiltBend;
          let r  = p.lerp(f.stemC[0], f.stemC[0] * 0.5, tt);
          let gc = p.lerp(f.stemC[1], f.stemC[1] * 0.5, tt);
          let b  = p.lerp(f.stemC[2], f.stemC[2] * 0.5, tt);
          if (wl > 0) {
            r  = p.lerp(r,  r  * 0.4 + 30, wl * 0.5);
            gc = p.lerp(gc, gc * 0.3 + 15, wl * 0.5);
            b  = p.lerp(b,  b  * 0.25 + 8, wl * 0.5);
          }
          g.fill(r, gc, b);
          g.ellipse(stemX + curveX, y, sw, 5);
          g.fill(r * 1.4, gc * 1.4, b * 1.3, 50);
          g.ellipse(stemX + curveX - 2, y, sw * 0.2, 3);
        }
        if (progress > 0.3) {
          const leafP = p.constrain((progress - 0.3) / 0.4, 0, 1);
          const ly = stemTop + stemLen * 0.22;
          const lx = stemX + p.sin(0.22 * p.PI * 0.3) * 22;
          drawLeaf(g, lx, ly, -1, 48 * leafP, f.stemC);
        }
        if (progress > 0.5) {
          const leafP = p.constrain((progress - 0.5) / 0.4, 0, 1);
          const ly = stemTop + stemLen * 0.50;
          const lx = stemX + p.sin(0.50 * p.PI * 0.3) * 22;
          drawLeaf(g, lx, ly, 1, 42 * leafP, f.stemC);
        }
        if (progress > 0.7) {
          const leafP = p.constrain((progress - 0.7) / 0.3, 0, 1);
          const ly = stemTop + stemLen * 0.35;
          const lx = stemX + p.sin(0.35 * p.PI * 0.3) * 22;
          drawLeaf(g, lx, ly, -1, 35 * leafP, f.stemC);
        }
      }

      function drawLeaf(g, x, y, side, sz, sc) {
        if (sz < 2) return;
        g.push(); g.translate(x, y); g.rotate(side * 0.65);
        g.fill(sc[0]*0.85, sc[1]*1.15, sc[2]*0.75);
        g.beginShape();
        g.vertex(0, 0);
        g.bezierVertex(sz*0.35*side, -sz*0.38, sz*0.85*side, -sz*0.22, sz*1.35*side, 0);
        g.bezierVertex(sz*0.85*side,  sz*0.22,  sz*0.35*side, sz*0.38, 0, 0);
        g.endShape(p.CLOSE);
        g.fill(sc[0]*1.1, sc[1]*1.4, sc[2]*1.0, 60);
        g.beginShape();
        g.vertex(sz*0.1*side, 0);
        g.bezierVertex(sz*0.4*side, -sz*0.15, sz*0.7*side, -sz*0.08, sz*1.0*side, 0);
        g.bezierVertex(sz*0.7*side,  sz*0.08,  sz*0.4*side, sz*0.15,  sz*0.1*side, 0);
        g.endShape(p.CLOSE);
        g.stroke(sc[0]*1.3, sc[1]*1.5, sc[2]*1.2, 70);
        g.strokeWeight(0.8);
        g.line(0, 0, sz*1.15*side, 0);
        for (let i = 1; i <= 3; i++) {
          const vx = sz * 0.3 * i * side;
          g.line(vx, 0, vx + sz*0.2*side, -sz*0.12);
          g.line(vx, 0, vx + sz*0.2*side,  sz*0.12);
        }
        g.noStroke(); g.pop();
      }

      function rot3D(x, y, z) {
        const cY = p.cos(rotY), sY = p.sin(rotY);
        const rx  = x*cY + z*sY;
        const rz  = -x*sY + z*cY;
        const cX  = p.cos(rotX), sX = p.sin(rotX);
        const ry  = y*cX - rz*sX;
        const rz2 = y*sX + rz*cX;
        const cZ  = p.cos(rotZ), sZ = p.sin(rotZ);
        const fx  = rx*cZ - ry*sZ;
        const fy  = rx*sZ + ry*cZ;
        return [fx, fy, rz2];
      }

      function drawPeony3D(g, f, bl, wl, cx, cy) {
        wl = wl || 0;
        const focal    = 420;
        const wiltTilt = wl * 0.18;
        const cosW = p.cos(wiltTilt), sinW = p.sin(wiltTilt);
        const items = [];

        if (f.sepals && bl < 0.7) {
          const numS    = f.sepals;
          const openAng = easeInOutCubic(bl) * p.HALF_PI * 0.9;
          let sepalAlpha = p.map(p.constrain(bl, 0, 0.7), 0, 0.7, 255, 0);
          if (wl) sepalAlpha *= (1 - wl);
          if (sepalAlpha > 5) {
            for (let i = 0; i < numS; i++) {
              const a      = (p.TWO_PI / numS) * i;
              const sTilt  = p.HALF_PI * 0.35 - openAng;
              const dist   = 50;
              const ct = p.cos(sTilt), st = p.sin(sTilt);
              const x3 = p.cos(a)*dist*ct, z3 = p.sin(a)*dist*ct, y3 = -st*dist;
              const [rx, ry, rz] = rot3D(x3, y3, z3);
              const ps     = focal / (focal + rz);
              const sepAng = p.atan2(ry, rx);
              const fv     = p.max(focal / (focal + p.abs(rz)), 0.15);
              items.push({ rz, tp:'s', sx:rx*ps, sy:ry*ps, sa:sepAng,
                sLen:80*ps, sW:25*ps*fv, sAlpha:sepalAlpha, sc:f.stemC });
            }
          }
        }

        const cAlpha = p.constrain((bl - 0.45) / 0.3, 0, 1) * (1 - wl);
        if (cAlpha > 0) items.push({ rz:0, tp:'c', sx:0, sy:0, sa:0, alpha:cAlpha });

        for (let layer = f.layers; layer >= 0; layer--) {
          const lr         = layer / f.layers;
          const layerDelay = (1 - lr) * 0.35;
          const layerBl    = p.constrain((bl - layerDelay) / (1 - layerDelay), 0, 1);
          const ebl        = easeInOutCubic(layerBl);
          if (ebl < 0.01) continue;
          const layerFall = p.constrain((wl * 1.4 - (1 - lr) * 0.4) / 0.6, 0, 1);
          if (layerFall > 0.9) continue;
          const innerBoost = (1 - lr);
          const np         = f.petalsPerLayer + p.floor(layer * 1.5) + p.floor(innerBoost * 5);
          const baseR      = p.lerp(10, f.maxRadius, lr);
          let tiltAngle    = p.lerp(p.PI * 0.42, p.PI * 0.04, ebl) + layerFall * p.PI * 0.22;
          tiltAngle -= innerBoost * 0.15 * ebl;
          const cosTilt = p.cos(tiltAngle), sinTilt = p.sin(tiltAngle);

          for (let i = 0; i < np; i++) {
            const petalHash = ((i * 73 + layer * 137) & 0xFF) / 255;
            if (wl > 0.1 && petalHash < (wl - 0.1) * 1.3) continue;
            let angle = (p.TWO_PI / np) * i + layer * 0.42 + p.sin(layer * 2.1) * 0.12;
            angle += petalHash * 0.15;
            const droopAmt = layerFall * 0.5 * (0.4 + lr * 0.6);
            const shrink   = 1 - layerFall * 0.35;
            const dist     = baseR * ebl * (0.35 + lr * 0.25);
            let x3 = p.cos(angle)*dist*cosTilt, z3 = p.sin(angle)*dist*cosTilt, y3 = -sinTilt*dist + droopAmt*28;
            if (wiltTilt > 0.001) {
              const ny = y3*cosW - x3*sinW*0.3;
              x3 = x3 + y3*sinW*0.3; y3 = ny;
            }
            const [rx, ry, rz] = rot3D(x3, y3, z3);
            const ps         = focal / (focal + rz);
            const sx         = rx * ps, sy = ry * ps;
            const viewAngle  = p.atan2(ry, rx);
            const depthFactor = focal / (focal + p.abs(rz));
            const faceVis    = p.max(depthFactor, 0.12);
            const nx3 = p.cos(angle)*cosTilt, ny3 = -sinTilt, nz3 = p.sin(angle)*cosTilt;
            const [,,lnz] = rot3D(nx3, ny3, nz3);
            const lightDot = p.constrain(-lnz, -1, 1);
            const lightMod = p.map(lightDot, -1, 1, 0.32, 1.25);
            const cupFactor = (1 - lr) * (1 - ebl * 0.5) * 0.35;
            const pl = baseR * (0.2 + 0.8*ebl) * (1.15 + innerBoost*0.3) * shrink * ps;
            let pw = baseR * (0.15 + 0.85*ebl) * 0.55 * shrink * ps * faceVis;
            pw *= (1 + cupFactor);
            const rPhase = i*1.7 + layer*0.9;
            const rAmt   = f.ruffleAmt * ebl * (1 + layerFall*2 + innerBoost*0.5) * ps;
            const lA     = p.sin(angle + layer*0.5);
            const dM     = p.map(layer, 0, f.layers, 0.35, 1.0);
            const bB     = 0.4 + 0.6*ebl;
            const cm     = p.map(lA, -1, 1, 0.45, 1.2) * dM * bB * lightMod;
            let r  = p.constrain(p.lerp(f.c1[0], f.c2[0], lr) * cm, 0, 255);
            let gr = p.constrain(p.lerp(f.c1[1], f.c2[1], lr) * cm, 0, 255);
            let b  = p.constrain(p.lerp(f.c1[2], f.c2[2], lr) * cm, 0, 255);
            if (wl > 0) {
              const wf = p.min(1, layerFall * 1.3);
              r  = p.lerp(r,  r  * 0.5 + 55, wf);
              gr = p.lerp(gr, gr * 0.28 + 22, wf);
              b  = p.lerp(b,  b  * 0.12 + 6,  wf);
            }
            items.push({ rz, tp:'p', sx, sy, sa:viewAngle, pl, pw, rPhase, rAmt, r, gr, b, cup:cupFactor });
          }
        }

        items.sort((a, b) => a.rz - b.rz);

        for (const it of items) {
          if (it.tp === 'c') {
            g.push(); g.translate(cx, cy);
            const [cnx, cny, cnz] = rot3D(0, -1, 0);
            const cps = focal / (focal + cnz*15);
            const csx = cnx*15*cps, csy = cny*15*cps;
            for (let r = 28; r > 0; r -= 3) {
              const ratio = r / 28;
              g.fill(
                p.lerp(f.c3[0]*0.1, f.c3[0]*0.7, ratio) * (it.alpha||1),
                p.lerp(f.c3[1]*0.1, f.c3[1]*0.7, ratio) * (it.alpha||1),
                p.lerp(f.c3[2]*0.1, f.c3[2]*0.7, ratio) * (it.alpha||1)
              );
              g.ellipse(csx, csy, r*2.2*cps, r*2.2*cps);
            }
            if (bl > 0.65) {
              const sa2 = p.constrain((bl - 0.65) / 0.25, 0, 1) * (1 - wl);
              for (let i = 0; i < 22; i++) {
                const a   = (p.TWO_PI / 22) * i;
                const d   = 6 + (i % 5) * 3;
                const stX = p.cos(a)*d*sa2, stZ = p.sin(a)*d*sa2, stY = -3;
                const [srx, sry, srz] = rot3D(stX, stY, stZ);
                const stP = focal / (focal + srz);
                g.fill(f.c2[0]*0.7, f.c2[1]*0.5, f.c2[2]*0.3, 140*sa2);
                g.ellipse(srx*stP, sry*stP, 2.5*stP, 2.5*stP);
              }
            }
            g.pop();

          } else if (it.tp === 's') {
            if (!it.sW || it.sW < 1) continue;
            g.push(); g.translate(cx + it.sx, cy + it.sy); g.rotate(it.sa);
            g.fill(it.sc[0]*0.7, it.sc[1]*1.0, it.sc[2]*0.6, it.sAlpha);
            g.beginShape();
            g.vertex(0, 0);
            g.bezierVertex(it.sLen*0.3, -it.sW*0.6, it.sLen*0.7, -it.sW*0.4, it.sLen, 0);
            g.bezierVertex(it.sLen*0.7,  it.sW*0.4,  it.sLen*0.3,  it.sW*0.6, 0, 0);
            g.endShape(p.CLOSE);
            g.pop();

          } else {
            if (!it.pw || it.pw < 0.5) continue;
            g.push(); g.translate(cx + it.sx, cy + it.sy); g.rotate(it.sa);
            g.fill(it.r, it.gr, it.b);
            g.beginShape();
            for (let tt = 0; tt <= 1; tt += 0.07) {
              const px  = tt * it.pl;
              const bW  = p.sin(tt * p.PI) * it.pw;
              const cup = p.sin(tt * p.PI) * (it.cup||0) * it.pw * 0.6;
              const ruf = p.sin(tt*8 + it.rPhase) * it.rAmt * tt;
              g.vertex(px, bW + ruf + cup);
            }
            for (let tt = 1; tt >= 0; tt -= 0.07) {
              const px  = tt * it.pl;
              const bW  = p.sin(tt * p.PI) * it.pw;
              const cup = p.sin(tt * p.PI) * (it.cup||0) * it.pw * 0.4;
              const ruf = p.sin(tt*8 + it.rPhase + p.PI) * it.rAmt * tt;
              g.vertex(px, -bW + ruf - cup);
            }
            g.endShape(p.CLOSE);
            g.pop();
          }
        }
      }

      function renderToScreen() {
        const px      = buf.pixels;
        const g       = p.max(4, p.round(grid));
        const asciiG  = p.max(g, 6);
        const scaleF  = p.min(p.width / BUF_W, p.height / BUF_H) * 0.85;
        const invScale = 1 / scaleF;
        const renderW = BUF_W * scaleF, renderH = BUF_H * scaleF;
        const ox = (p.width  - renderW) / 2 + mInfX;
        const oy = (p.height - renderH) / 2 + mInfY;
        const curM         = renderMode, prevM = prevMode, mt = modeT;
        const transitionDone = mt >= 0.99;
        const useNative    = (curM === 0) || (!transitionDone && prevM === 0);
        if (useNative) { ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; }
        const gEff  = (curM === 0 && transitionDone) ? asciiG : g;
        const halfG = gEff * 0.5;
        const yStart = p.max(0, p.floor(oy / gEff) * gEff);
        const yEnd   = p.min(p.height, oy + renderH);
        const xStart = p.max(0, p.floor(ox / gEff) * gEff);
        const xEnd   = p.min(p.width, ox + renderW);
        const asciiSize = gEff * 1.1;
        let lastFontStr = '';

        for (let sy = yStart; sy < yEnd; sy += gEff) {
          const byBase = p.floor((sy - oy) * invScale);
          if (byBase < 0 || byBase >= BUF_H) continue;
          const rowOff = byBase * BUF_W;
          for (let sx = xStart; sx < xEnd; sx += gEff) {
            const bx = p.floor((sx - ox) * invScale);
            if (bx < 0 || bx >= BUF_W) continue;
            const idx = (rowOff + bx) * 4;
            const r = px[idx], gr = px[idx+1], b = px[idx+2];
            if ((r + gr + b) < 12) continue;
            const bright = r*0.299 + gr*0.587 + b*0.114;
            const cx = sx + halfG, cy = sy + halfG;
            let mode;
            if (transitionDone) {
              mode = curM;
            } else {
              const hash = ((sx*73 + sy*137) & 0xFF) * 0.00392;
              mode = hash < mt ? curM : prevM;
            }
            if (mode === 0) {
              const fontSz  = p.floor(asciiSize * (0.4 + bright * 0.004));
              const fontStr = fontSz + 'px Courier New';
              if (fontStr !== lastFontStr) { ctx.font = fontStr; lastFontStr = fontStr; }
              ctx.fillStyle = 'rgb(' + r + ',' + gr + ',' + b + ')';
              const ci = ((bright >> 2) + ((sx*7 + sy*13) >> 3)) % chars.length;
              ctx.fillText(chars[ci], cx, cy);
            } else if (mode === 1) {
              p.fill(r, gr, b);
              const d = gEff * (0.1 + bright * 0.0033);
              p.ellipse(cx, cy, d, d);
            } else {
              p.fill(r, gr, b);
              p.rectMode(p.CENTER);
              p.rect(cx, cy, gEff*0.93, gEff*0.93);
            }
          }
        }
      }

      function drawHud() {
        p.fill(255, 255, 255, 40);
        p.textSize(9);
        p.textAlign(p.LEFT, p.TOP);
        p.text(p.floor(p.frameRate()) + ' fps' + (paused ? '  |  pausa' : '  |  ' + phase), 10, 10);
        p.textAlign(p.CENTER, p.CENTER);
      }

      p.mousePressed = function() {
        if (loadingPhase) return;
        if (!audio) initAudio();
        triggerGlitch();
        const f = elements[curEl];
        if (phase === 'interactive' || phase === 'growing') petalBurst(f, p.floor(p.random(8, 16)));
      };

      p.keyPressed = function() {
        if (p.key === 'f' || p.key === 'F') { const fs = p.fullscreen(); p.fullscreen(!fs); }
        if (p.key === 'g' || p.key === 'G') triggerGlitch();
        if (p.key === 'p' || p.key === 'P') petalBurst(elements[curEl], p.floor(p.random(10, 20)));
        if (p.key === 's' || p.key === 'S') toggleSound();
        if (p.key === ' ') paused = !paused;
      };

      p.mouseWheel = function(e) {
        if (loadingPhase) return;
        gridTarget = p.constrain(gridTarget + (e.delta > 0 ? 1.5 : -1.5), GRID_MIN, GRID_MAX);
        densDir = e.delta > 0 ? -1 : 1;
        return false;
      };

      p.windowResized = function() {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
      };
    };

    p5Instance = new p5(sketch, document.getElementById('canvas-container'));
  </script>
</body>
